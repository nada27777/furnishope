<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Furni.css">
</head>
<body>
    <section class="product-page">
    <div class="product-container">
        <div class="product-visual">
            <img id="main-product-img" src="" alt="Product Image">
        </div>

        <div class="product-details">
            <h1 id="product-title"></h1>
            <p class="price" id="product-price"></p>
            <p class="description">
                Piece of furniture is designed for both comfort and style, 
                fitting perfectly into any modern home layout.
            </p>
            <div class="actions">
                <button class="buy-btn">Add to Cart</button>
            </div>
        </div>
    </div>
</section>
<script src="Furni.js"></script>
</body>
</html>
